<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Verification Portal</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: 1.5rem;
        }

        .portal-container {
            width: 100%;
            max-width: 440px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            background: #334155;
        }

        .status-badge {
            position: absolute;
            bottom: 0;
            right: 4px;
            background: var(--accent-green);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            border: 2px solid #1e293b;
            text-transform: uppercase;
        }

        .student-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
        }

        .student-uid {
            font-size: 0.85rem;
            color: var(--accent-blue);
            font-family: monospace;
            font-weight: 600;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: span 2;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .info-value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .footer-verification {
            border-top: 1px solid var(--border-color);
            padding-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .secure-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
        }

        .error-state { color: #ef4444; }
        .error-state .student-uid { color: #ef4444; }
        .error-state .profile-img { border-color: #ef4444; }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="profile-card" id="card">
            <div class="avatar-container">
                <img id="studentPhoto" src="https://api.dicebear.com/7.x/initials/svg?seed=fallback" alt="Avatar" class="profile-img">
                <span id="statusLabel" class="status-badge">Active</span>
            </div>
            
            <h2 id="studentName" class="student-name">Loading Profile...</h2>
            <p id="studentUid" class="student-uid">UID: Checking...</p>

            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Class & Section</span>
                    <span id="studentClass" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Roll Number</span>
                    <span id="studentRoll" class="info-value">—</span>
                </div>
                <div class="info-item full-width">
                    <span class="info-label">Admission No</span>
                    <span id="studentAdm" class="info-value">—</span>
                </div>
                <div class="info-item full-width">
                    <span class="info-label">Father's Name</span>
                    <span id="studentFather" class="info-value">—</span>
                </div>
                <div class="info-item full-width">
                    <span class="info-label">Mother's Name</span>
                    <span id="studentMother" class="info-value">—</span>
                </div>
            </div>

            <div class="footer-verification">
                <div class="secure-dot"></div>
                <span id="verificationStatus">Verified Student Directory Connection</span>
            </div>
        </div>
    </div>

        function initializePortal() {
            const urlParameters = new URLSearchParams(window.location.search);
            const targetId = urlParameters.get('id');
            const cardElement = document.getElementById('card');

            if (targetId && studentDatabase[targetId]) {
                const data = studentDatabase[targetId];

                document.getElementById('studentName').innerText = data.name;
                document.getElementById('studentUid').innerText = "ROLL NO: " + targetId;
                document.getElementById('studentClass').innerText = "XI - A";
                document.getElementById('studentRoll').innerText = targetId;
                document.getElementById('studentAdm').innerText = data.adm;
                document.getElementById('studentFather').innerText = data.father;
                document.getElementById('studentMother').innerText = data.mother;
                
                document.getElementById('studentPhoto').src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(data.name)}&backgroundType=gradientLinear`;
                document.title = `${data.name} - Profile`;
            } else {
                cardElement.classList.add('error-state');
                document.getElementById('studentName').innerText = "Invalid Scan";
                document.getElementById('studentUid').innerText = "ERROR: STUDENT NOT FOUND";
                document.getElementById('statusLabel').innerText = "FAIL";
                document.getElementById('statusLabel').style.background = "#ef4444";
                document.getElementById('studentPhoto').src = "https://api.dicebear.com/7.x/icons/svg?seed=warning&icon=shieldAlert";
                document.getElementById('verificationStatus').innerText = "Record Missing from Directory Core.";
                
                const fields = ['studentClass', 'studentRoll', 'studentAdm', 'studentFather', 'studentMother'];
                fields.forEach(f => document.getElementById(f).innerText = "UNAUTHORIZED");
            }
        }

        window.addEventListener('DOMContentLoaded', initializePortal);
    </script>
</body>
</html>
